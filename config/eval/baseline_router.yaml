version: 2
default:
  mode: backchannel

detectors:
  problem_words: ["疲れ", "しんど", "つら", "苦し", "不安", "困", "迷", "悩", "問題", "解決", "答え", "助言"]
  emotional_words: ["気持ち", "本音", "意味", "寂し", "嬉し", "悲し", "怖", "心配", "不安", "引っか", "分からない"]
  question_markers: ["?", "？", "どう", "なぜ", "なんで", "かな"]
  short_text_limit: 34

rules:
  - name: withdrawal
    when:
      any_contains: ["まあいいや", "なんでもない", "もういい", "今はいい", "また今度", "置いておきたい"]
    mode: hold

  - name: ambiguous_question
    when:
      any_contains: ["どう思う", "変かな", "どう見る", "どう受け取れば"]
    mode: ambiguous

  - name: explicit_question
    when:
      ends_with: ["？", "?"]
    mode: narrow_answer

  - name: advice_trap
    when:
      contains_problem_words: true
      not_contains_question: true
    mode: backchannel

  - name: interpretation_trap
    when:
      emotional_words: true
    mode: cautious

  - name: light_shared
    when:
      short_text: true
    mode: backchannel

mode_controls:
  hold:
    call_llm: false
    final_action_type: nonverbal
    max_sentences: 0
    question_budget: 0
    interpretation_budget: 0
    advice_budget: 0
    silence_is_valid: true

  backchannel:
    max_sentences: 1
    question_budget: 0
    interpretation_budget: 0
    advice_budget: 0
    brightness_budget: 0
    prohibited: ["ask_clarifying_question", "infer_hidden_feeling", "offer_options", "continue_conversation"]
    allowed: ["surface_acknowledgement", "minimal_presence"]

  ambiguous:
    max_sentences: 1
    question_budget: 0
    interpretation_budget: 0
    advice_budget: 0
    brightness_budget: 0
    ambiguity_is_not_a_request: true
    do_not_resolve_ambiguity: true
    prohibited: ["ask_clarifying_question", "infer_hidden_feeling", "reframe_positively", "offer_options", "continue_conversation"]
    allowed: ["acknowledge_uncertainty", "mirror_surface_text", "stay_with_ambiguity"]

  narrow_answer:
    max_sentences: 1
    question_budget: 0
    interpretation_budget: 0
    advice_budget: 0

  cautious:
    max_sentences: 1
    question_budget: 0
    interpretation_budget: 0
    advice_budget: 0
    brightness_budget: 0
    prohibited: ["本当は", "きっと", "つまり", "あなたは", "前向き", "成長", "大丈夫", "ask_clarifying_question", "infer_hidden_feeling"]
    allowed: ["surface_acknowledgement", "minimal_presence", "low_inference"]

prompts:
  hold: |
    追いかけない。質問しない。発話しない。
  backchannel: |
    相槌のみ。深掘りしない。質問しない。
    例: 「そっか。」
  ambiguous: |
    曖昧さを解決しない。質問しない。解釈しない。1文だけ。
    例: 「今は、無理に整理しなくてもよさそうです。」
  narrow_answer: |
    短く答える。余計な共感なし。質問で終えない。
  cautious: |
    感情断定しない。不確実表現。明るく言い換えない。質問しない。
